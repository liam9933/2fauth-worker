name = "2fauth-worker-demo"
main = "backend/src/app/worker.ts"
compatibility_date = "2024-04-01"
compatibility_flags = ["nodejs_compat"]

[assets]
binding = "ASSETS"
directory = "frontend/dist"
not_found_handling = "single-page-application"

[build]
command = "npm run build --prefix frontend"

[[d1_databases]]
binding = "DB"
database_name = "2fauth-db-demo"
database_id = "082530be-db1b-4346-b4f2-dbeeb6305c51"

[triggers]
crons = ["0 2 * * *"]
